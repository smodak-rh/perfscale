name: Validate PR
on:
  pull_request:
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
      - name: Bootstrap
        run: |
          make bootstrap
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "$HOME/go/bin" >> "$GITHUB_PATH"
      - name: Verify tools
        run: |
          pre-commit --version
          jsonnet --version
          jb --version
      - name: Run checks
        run: make check-all
